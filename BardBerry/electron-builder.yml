appId: com.rollberrystudios.bardberry
productName: BardBerry
copyright: Copyright © 2026 RollBerry Studios

extraMetadata:
  main: dist/main/main.js
  name: bardberry
  productName: BardBerry
  description: Local music, ambience, and SFX cockpit for virtual tabletop rounds

directories:
  output: release
  buildResources: resources

files:
  - dist/main/**/*
  - dist/preload/**/*
  - dist/renderer/**/*
  - node_modules/**/*
  - package.json
  - "!node_modules/**/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!node_modules/**/{test,__tests__,tests,powered-test,example,examples}"
  - "!node_modules/.bin"
  - "!**/*.map"
  - "!src/**"
  - "!**/*.ts"

asarUnpack:
  - node_modules/better-sqlite3/**/*
  - node_modules/bindings/**/*
  - node_modules/file-uri-to-path/**/*

win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: BardBerry
  runAfterFinish: true

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  icon: resources/icon.icns
  category: public.app-category.music
  hardenedRuntime: true
  gatekeeperAssess: false
  identity: null
  notarize: false

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: resources/icon.png
  category: AudioVideo
  description: Local music, ambience, and SFX cockpit for virtual tabletop rounds
