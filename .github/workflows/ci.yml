name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'

permissions:
  contents: read

jobs:
  encoding-check:
    name: Check Source Encoding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Check for Mojibake
        run: |
          if grep -rn "icon: '[^']*[âðÃ][^']*'" src/ --include="*.tsx" --include="*.ts" -l; then
            echo "::error::Mojibake detected!"
            grep -rn "icon: '[^']*[âðÃ][^']*'" src/ --include="*.tsx" --include="*.ts"
            exit 1
          fi

  lint-and-test:
    name: Lint & Test
    needs: encoding-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Check i18n keys
        run: npm run check:i18n
      - name: Lint
        run: npm run lint

  build-check:
    name: Build & Bundle Check
    needs: encoding-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build && npm run check:bundle

  e2e:
    name: E2E (Playwright)
    needs: encoding-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build app
        run: npm run build
      - name: Run E2E tests
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  packaged-smoke-linux:
    name: Packaged Smoke (Linux)
    needs: [encoding-check, build-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          lfs: true
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Package unpacked app
        run: npm run pack
      - name: Run packaged smoke
        shell: bash
        run: |
          exe="$(find release -maxdepth 3 -type f -perm -111 \( -name 'BoltBerry' -o -name 'boltberry' \) | head -n 1)"
          if [ -z "$exe" ]; then
            echo "::error::Could not find packaged BoltBerry executable under release/"
            find release -maxdepth 3 -type f -print
            exit 1
          fi
          echo "Testing packaged executable: $exe"
          npx @electron/fuses read --app "$exe"
          BOLTBERRY_E2E_EXECUTABLE_PATH="$exe" xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" npm run test:e2e:packaged

  packaged-qa-ui-linux:
    name: Packaged QA UI (Linux)
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    needs: [encoding-check, build-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          lfs: true
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Package unfused QA app
        run: npm run pack:qa:unfused
      - name: Run packaged UI and live-session QA
        shell: bash
        run: |
          exe="$(find release/qa-unfused -maxdepth 4 -type f -perm -111 \( -name 'BoltBerry' -o -name 'boltberry' \) | head -n 1)"
          if [ -z "$exe" ]; then
            echo "::error::Could not find unfused QA BoltBerry executable under release/qa-unfused/"
            find release/qa-unfused -maxdepth 4 -type f -print
            exit 1
          fi
          echo "Testing unfused QA executable: $exe"
          npx @electron/fuses read --app "$exe"
          BOLTBERRY_E2E_EXECUTABLE_PATH="$exe" xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            npx playwright test e2e/smoke/packaged-app.spec.ts --project=smoke
          BOLTBERRY_E2E_EXECUTABLE_PATH="$exe" xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            npx playwright test \
              e2e/critical-path/player-window.spec.ts \
              e2e/critical-path/two-window-sync.spec.ts \
              e2e/critical-path/player-render-workflows.spec.ts \
              e2e/regression/player-ui-regressions.spec.ts \
              e2e/critical-path/scene-grid-workflows.spec.ts \
              e2e/regression/canvas-context-actions.spec.ts \
              --project=critical-path --project=regression
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: playwright-report-packaged-qa-linux
          path: playwright-report/
          retention-days: 14

  e2e-cross-platform-smoke:
    name: E2E Smoke (${{ matrix.os }})
    needs: encoding-check
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install chromium
      - name: Build app
        run: npm run build
      - name: Run smoke E2E
        run: npx playwright test --project=smoke
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: playwright-report-${{ matrix.os }}
          path: playwright-report/
          retention-days: 7

  e2e-nightly-stress:
    name: E2E Nightly Stress
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: encoding-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build app
        run: npm run build
      - name: Run nightly E2E stress tests
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" npm run test:e2e:nightly
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: playwright-report-nightly
          path: playwright-report/
          retention-days: 14
